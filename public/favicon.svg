<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="70%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE7F3" />
      <stop offset="30%" stop-color="#FCD34D" />
      <stop offset="70%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4B5563" />
      <stop offset="50%" stop-color="#1F2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Ring with Glow -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="10" filter="url(#glow)" />
  <circle cx="256" cy="256" r="224" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-dasharray="10 8" opacity="0.7" />

  <!-- Content Group -->
  <g transform="translate(256, 256) scale(0.95) translate(-256, -256)">
    <!-- Dice 1 (Left, Angled) -->
    <g transform="rotate(-15, 160, 310)">
      <rect x="110" y="260" width="100" height="100" rx="18" fill="#F8FAFC" stroke="url(#goldGrad)" stroke-width="5" filter="url(#glow)" />
      <!-- Pips on Left Dice -->
      <circle cx="140" cy="290" r="7.5" fill="#0F172A" />
      <circle cx="180" cy="330" r="7.5" fill="#0F172A" />
      <circle cx="160" cy="310" r="9.5" fill="#EF4444" /> <!-- Center Red Pip -->
    </g>

    <!-- Dice 2 (Right, Angled) -->
    <g transform="rotate(15, 350, 310)">
      <rect x="302" y="260" width="100" height="100" rx="18" fill="#F8FAFC" stroke="url(#goldGrad)" stroke-width="5" filter="url(#glow)" />
      <!-- Pips on Right Dice -->
      <circle cx="332" cy="290" r="7" fill="#0F172A" />
      <circle cx="372" cy="290" r="7" fill="#0F172A" />
      <circle cx="332" cy="330" r="7" fill="#0F172A" />
      <circle cx="372" cy="330" r="7" fill="#0F172A" />
      <circle cx="352" cy="310" r="7.5" fill="#0F172A" />
    </g>

    <!-- Stylized Top Hat -->
    <!-- Hat Brim -->
    <ellipse cx="256" cy="235" rx="150" ry="22" fill="url(#goldGrad)" stroke="#1E293B" stroke-width="3" />
    
    <!-- Hat Body -->
    <path d="M 148 230 L 162 95 C 162 85, 182 72, 256 72 C 330 72, 350 85, 350 95 L 364 230 Z" fill="url(#hatGrad)" stroke="url(#goldGrad)" stroke-width="5" />
    
    <!-- Hat Ribbon -->
    <path d="M 149 210 L 150 230 C 150 230, 210 240, 256 240 C 302 240, 362 230, 362 230 L 363 210 C 363 210, 302 220, 256 220 C 210 220, 149 210, 149 210 Z" fill="url(#accentGrad)" stroke="#1E293B" stroke-width="2" />
    
    <!-- Gold Ribbon Buckle -->
    <rect x="236" y="211" width="40" height="24" rx="4" fill="url(#goldGrad)" stroke="#1E293B" stroke-width="2" />
    <rect x="246" y="217" width="20" height="12" rx="2" fill="#EF4444" />
    
    <!-- Stylized Gavel (Overlapped at center bottom) -->
    <g transform="translate(256, 375) scale(0.95)">
      <!-- Gavel Handle -->
      <line x1="0" y1="0" x2="-80" y2="80" stroke="url(#goldGrad)" stroke-width="15" stroke-linecap="round" />
      <line x1="0" y1="0" x2="-80" y2="80" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" opacity="0.4" />
      <!-- Gavel Head -->
      <rect x="-35" y="-60" width="70" height="40" rx="6" fill="#78350F" stroke="url(#goldGrad)" stroke-width="5.5" transform="rotate(45, 0, -40)" />
      <rect x="-45" y="-55" width="10" height="30" rx="2" fill="url(#goldGrad)" transform="rotate(45, 0, -40)" />
      <rect x="35" y="-55" width="10" height="30" rx="2" fill="url(#goldGrad)" transform="rotate(45, 0, -40)" />
    </g>
  </g>

  <!-- Title Text Plaque (Monopoly Madness logo feel) -->
  <rect x="76" y="415" width="360" height="52" rx="26" fill="#EF4444" stroke="url(#goldGrad)" stroke-width="5.5" filter="url(#glow)" />
  <text x="256" y="451" font-family="'Outfit', 'Impact', 'Arial Black', sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">
    MONOPOLY MADNESS
  </text>
</svg>
