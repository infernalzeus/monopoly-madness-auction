<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>

    <!-- Neon cyan glow -->
    <filter id="glowC" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="10" result="b1"/>
      <feGaussianBlur stdDeviation="22" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Neon magenta glow -->
    <filter id="glowM" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="9" result="b1"/>
      <feGaussianBlur stdDeviation="20" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft outer ring glow -->
    <filter id="ringGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <linearGradient id="die1Face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#112233"/>
      <stop offset="100%" stop-color="#071422"/>
    </linearGradient>
    <linearGradient id="die2Face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0B28"/>
      <stop offset="100%" stop-color="#0B0518"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bgG)"/>
  <!-- Outer neon ring -->
  <circle cx="256" cy="256" r="244" fill="none" stroke="#00E5FF" stroke-width="5" filter="url(#ringGlow)" opacity="0.85"/>
  <!-- Inner dashed ring -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.3"/>

  <!-- ═══ Die 1 — Cyan theme, top-left, showing 4 pips ═══ -->
  <g transform="rotate(-18 185 200)" filter="url(#glowC)">
    <!-- Die face -->
    <rect x="68" y="92" width="200" height="200" rx="30" fill="url(#die1Face)"/>
    <!-- Neon border -->
    <rect x="68" y="92" width="200" height="200" rx="30" fill="none" stroke="#00E5FF" stroke-width="7"/>
    <rect x="68" y="92" width="200" height="200" rx="30" fill="none" stroke="#7FF8FF" stroke-width="2" opacity="0.5"/>
    <!-- 4 pips at corners -->
    <circle cx="120" cy="144" r="16" fill="#00E5FF"/>
    <circle cx="216" cy="144" r="16" fill="#00E5FF"/>
    <circle cx="120" cy="240" r="16" fill="#00E5FF"/>
    <circle cx="216" cy="240" r="16" fill="#00E5FF"/>
  </g>

  <!-- ═══ Die 2 — Magenta theme, bottom-right, showing 3 pips ═══ -->
  <g transform="rotate(18 328 312)" filter="url(#glowM)">
    <!-- Die face -->
    <rect x="246" y="220" width="200" height="200" rx="30" fill="url(#die2Face)"/>
    <!-- Neon border -->
    <rect x="246" y="220" width="200" height="200" rx="30" fill="none" stroke="#FF0090" stroke-width="7"/>
    <rect x="246" y="220" width="200" height="200" rx="30" fill="none" stroke="#FF80C8" stroke-width="2" opacity="0.5"/>
    <!-- 3 pips (diagonal) -->
    <circle cx="296" cy="270" r="16" fill="#FF0090"/>
    <circle cx="346" cy="320" r="16" fill="#FF0090"/>
    <circle cx="396" cy="370" r="16" fill="#FF0090"/>
  </g>

  <!-- ═══ "MM" neon text ═══ -->
  <text x="256" y="494" font-family="'Impact','Arial Black',sans-serif" font-size="56" font-weight="900"
    fill="#00E5FF" text-anchor="middle" letter-spacing="6" filter="url(#glowC)" opacity="0.9">MM</text>
  <text x="256" y="494" font-family="'Impact','Arial Black',sans-serif" font-size="56" font-weight="900"
    fill="#FFFFFF" text-anchor="middle" letter-spacing="6" opacity="0.92">MM</text>
</svg>
